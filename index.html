<!DOCTYPE html>
<html lang="en">
<head>

    <title>Happy Birthday Bangaram!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffebf0;

        }

            font-size: 2.5em;
            margin: 0;

            background-image: url('https://example.com/floral-background.png'); /* Replace with an actual floral image link */

        button {
            background-color: #ffb3d9;
            border: none;

        }
        button:hover {

        }

<body>
    <div class="floral">
        <h1>Happy Birthday Bangaram!</h1>
        <p>Wishing you an amazing day filled with love and joy! 🎉</p>

        <p>Happy 20th Birthday!</p>
        <button onclick="alert('Happy Birthday Bangaram!')">Wish Bangaram!</button>
